services:
  - type: web
    name: homivy-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: MONGO_URI
        sync: false # paste your Atlas connection string in the Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES
        value: 7d
      - key: CLIENT_URL
        sync: false # set to your Vercel URL once the frontend is deployed
      - key: PAYMENT_PROVIDER
        value: placeholder
